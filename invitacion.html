<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasaporte Scroll</title>

    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        overflow-x: hidden;
        font-family: Arial, sans-serif;
        background: #f6f2ef;
    }

    /* =========================================================
       SECCIÓN PASAPORTE
    ========================================================= */

    .passport-scroll {
        height: 260vh;
        position: relative;
        background: linear-gradient(180deg, rgba(205, 169, 205, 1) 0%, rgba(255, 251, 249, 1) 50%, rgba(205, 169, 205, 1) 100%);
    }

    .passport-sticky {
        position: sticky;
        top: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        perspective: 2200px;
        overflow: hidden;
    }

    .passport {
        width: min(95vw, 1200px);
        height: min(82vh, 680px);
        position: relative;
        transform-style: preserve-3d;
        transition: transform .2s linear;
    }

    .passport-page {
        position: absolute;
        top: 0;
        height: 100%;
        overflow: hidden;
        box-shadow:
            0 30px 80px rgba(0, 0, 0, .18);
    }

    /* =========================
       LADO IZQUIERDO
    ========================= */

    .passport-left {
        width: 50%;
        left: 0;
        z-index: 5;
        transform-origin: right center;
        transform-style: preserve-3d;
        border-radius: 28px 0 0 28px;
        transition: opacity .3s linear;
        transform: rotateY(180deg);
        background: none;
        overflow: hidden;
    }

    .passport-left::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: url('img.jpeg');
        background-position: center;
        background-size: cover;
        background-repeat: no-repeat;

        /* Corrige la imagen volteada */
        transform: rotateY(180deg);
        /* backface-visibility: hidden; */
    }

    .passport-cover-content {
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        text-align: center;
        /* padding: 40px; */
    }

    .passport-cover-content h1 {
        font-size: clamp(38px, 6vw, 70px);
        margin-bottom: 20px;
        letter-spacing: 4px;
    }

    .passport-cover-content p {
        opacity: .8;
        letter-spacing: 5px;
        text-transform: uppercase;
        font-size: 14px;
    }

    /* =========================
       VIDEO
    ========================= */

    .passport-right {
        width: 50%;
        right: 0;
        background: #000;
        border-radius: 0 28px 28px 0;
        overflow: hidden;
        z-index: 2;
    }

    .passport-video {
        width: 100%;
        height: 100%;
        position: relative;
    }

    .passport-video video {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .video-overlay {
        position: absolute;
        inset: 0;
        background:
            linear-gradient(to top,
                rgba(0, 0, 0, .45),
                rgba(0, 0, 0, .08));
    }

    .video-text {
        position: absolute;
        bottom: 60px;
        left: 60px;
        z-index: 5;
        color: white;
        max-width: 500px;
    }

    .video-text h2 {
        font-size: clamp(42px, 5vw, 78px);
        line-height: .9;
        margin-bottom: 15px;
    }

    .video-text p {
        font-size: 18px;
        opacity: .85;
    }

    /* =========================================================
       SIGUIENTE CONTENIDO
    ========================================================= */

    .next-content {
        background: white;
        position: relative;
        z-index: 10;
    }

    section {
        min-height: 100vh;
        padding: 100px 8%;
    }

    .photos {
        background: #faf4f7;
    }

    .gallery {
        margin-top: 40px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 25px;
    }

    .gallery div {
        height: 300px;
        border-radius: 28px;
        background: #d8b4df;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #6c2179;
        font-weight: bold;
        font-size: 22px;
    }

    h3 {
        font-size: clamp(42px, 6vw, 80px);
        margin-bottom: 20px;
        color: #6f2d79;
    }

    section p {
        max-width: 700px;
        line-height: 1.7;
        color: #555;
        font-size: 18px;
    }

    /* =========================================================
       RESPONSIVE
    ========================================================= */
    /* =========================================================
   TABLET Y MOBILE
========================================================= */

    @media (max-width: 998px) {

        .passport-scroll {
            height: 240vh;
            /* background: #87359b; */
            /* background: #FFFBF9; */
            /* background: linear-gradient(180deg, rgba(255, 251, 249, 1) 4%, rgba(205, 169, 205, 1) 100%); */
            background: linear-gradient(180deg, rgba(205, 169, 205, 1) 0%, rgba(255, 251, 249, 1) 50%, rgba(205, 169, 205, 1) 100%);
        }

        .passport-sticky {
            padding: 0;
            align-items: center;
            justify-content: center;
        }

        .passport {
            width: min(92vw, 620px);
            height: min(92vh, 860px);
            aspect-ratio: 9 / 13;
        }

        .passport-left,
        .passport-right {
            width: 100%;
            height: 100%;
            border-radius: 26px;
        }

        .passport-left {
            left: 0;
            z-index: 10;
            transform-origin: left center;
            border: 0;
            background: none;
        }

        .passport-left::before {
            inset: 0;
            border: none;
            border-radius: 26px;
            background-image: url('img.jpeg');
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            /* background-color: #87359b; */
            /* transform: rotateY(180deg); */
        }

        .passport-left::before {
            transform: none;
        }

        .passport-right {
            right: auto;
            left: 0;
            z-index: 1;
            border-radius: 26px;
        }

        .passport-video video {
            object-fit: cover;
        }

        .video-text {
            left: 28px;
            right: 28px;
            bottom: 35px;
            max-width: none;
        }

        .video-text h2 {
            font-size: clamp(34px, 8vw, 58px);
        }

        .video-text p {
            font-size: 15px;
            line-height: 1.5;
        }
    }

    @media (max-width: 712px) {

        .passport-scroll {
            height: 230vh;
        }

        .passport {
            width: min(94vw, 430px);
            height: min(88vh, 760px);
            aspect-ratio: 9 / 14;
        }

        .passport-left,
        .passport-right,
        .passport-left::before {
            border-radius: 22px;
        }

        .passport-left::before {
            background-size: cover;
            background-position: center;
        }

        .video-text {
            left: 22px;
            right: 22px;
            bottom: 28px;
        }

        .video-text h2 {
            font-size: 34px;
        }

        .video-text p {
            font-size: 13px;
        }
    }

    @media (max-width: 480px) {

        .passport {
            width: 96vw;
            height: 86vh;
            aspect-ratio: 9 / 15;
        }

        .passport-left,
        .passport-right,
        .passport-left::before {
            border-radius: 18px;
        }

        .video-text {
            left: 18px;
            right: 18px;
            bottom: 24px;
        }

        .video-text h2 {
            font-size: 28px;
        }

        .video-text p {
            font-size: 12px;
        }
    }
    </style>
</head>

<body>

    <!-- =========================================================
         PASAPORTE
    ========================================================= -->

    <div class="passport-scroll" id="passportScroll">

        <div class="passport-sticky">

            <div class="passport" id="passport">

                <!-- TAPA -->
                <div class="passport-page passport-left" id="leftPage">

                    <div class="passport-cover-content">

                    </div>

                </div>

                <!-- VIDEO -->
                <div class="passport-page passport-right" id="rightPage">

                    <div class="passport-video">

                        <video autoplay muted loop playsinline>
                            <source src="assets/video/boda.mp4" type="video/mp4">
                        </video>

                        <div class="video-overlay"></div>

                        <div class="video-text">
                            <h2>Nuestra historia</h2>

                            <p>
                                Cada viaje tiene un comienzo,
                                y este es el nuestro.
                            </p>
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- =========================================================
         DEMÁS CONTENIDO
    ========================================================= -->

    <main class="next-content">

        <section class="photos">

            <h3>Fotos</h3>

            <p>
                Aquí puedes colocar las fotografías,
                recuerdos y demás contenido.
            </p>

            <div class="gallery">
                <div>Foto 1</div>
                <div>Foto 2</div>
                <div>Foto 3</div>
                <div>Foto 4</div>
            </div>

        </section>

        <section>

            <h3>Demás secciones</h3>

            <p>
                Aquí continúan las demás secciones
                de tu página.
            </p>

        </section>

    </main>

    <script>
    const scrollSection = document.getElementById('passportScroll');

    const leftPage = document.getElementById('leftPage');

    const rightPage = document.getElementById('rightPage');

    const passport = document.getElementById('passport');

    window.addEventListener('scroll', animatePassport, {
        passive: true
    });

    window.addEventListener('resize', animatePassport);

    function animatePassport() {

        const rect = scrollSection.getBoundingClientRect();

        const totalScroll =
            scrollSection.offsetHeight - window.innerHeight;

        let progress =
            Math.abs(rect.top) / totalScroll;

        progress =
            Math.min(Math.max(progress, 0), 1);

        /*
            0.00 → cerrado
            0.50 → abierto
            1.00 → video expandido
        */

        const openProgress =
            Math.min(progress / 0.50, 1);

        const expandProgress =
            Math.max((progress - 0.50) / 0.50, 0);

        /* =========================
           ABRIR TAPA
        ========================= */

        if (window.innerWidth <= 998) {


            const rotate = openProgress * -180;

            leftPage.style.transform = `rotateY(${rotate}deg)`;

        } else {


            const rotate = 180 - (openProgress * 180);

            leftPage.style.transform = `rotateY(${rotate}deg)`;
        }


        /* =========================
           DESAPARECER TAPA
        ========================= */

        if (openProgress > 0.92) {

            leftPage.style.opacity = 0;

        } else {

            leftPage.style.opacity = 1;

        }

        /* =========================
           EXPANDIR VIDEO
        ========================= */

        if (window.innerWidth <= 998) {

            rightPage.style.width = `100%`;

        } else {

            const width =
                50 + (expandProgress * 50);

            rightPage.style.width =
                `${width}%`;
        }

        if (window.innerWidth <= 998) {

            rightPage.style.borderRadius = `28px`;

        } else {

            if (expandProgress > 0.8) {

                rightPage.style.borderRadius =
                    `28px`;

            } else {

                rightPage.style.borderRadius =
                    `0 28px 28px 0`;
            }

        }

        /* =========================
           PEQUEÑO ZOOM
        ========================= */

        const scale =
            1 + (expandProgress * 0.08);

        passport.style.transform =
            `scale(${scale})`;

    }

    animatePassport();
    </script>

</body>

</html>
